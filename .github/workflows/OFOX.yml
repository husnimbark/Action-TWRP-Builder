name: OrangeFox - Build

on:
  workflow_dispatch:
    inputs:
      MANIFEST_BRANCH:
        description: 'OrangeFox Branch'
        required: true
        default: '12.1'
        type: choice
        options:
        - 12.1
        - 14.1
      DEVICE_TREE:
        description: 'Device Recovery Tree'
        required: true
        default: 'https://github.com/husnimbark/recovery_device_tecno_TECNO-KM6.git'
      DEVICE_TREE_BRANCH:
        description: 'Custom Recovery Tree Branch'
        required: true
        default: 'ofox-12.1'
      DEVICE_PATH:
        description: 'Specify your device path (LOCAL_PATH / DEVICE_PATH in BoardConfig.mk)'
        required: true
        default: 'device/tecno/TECNO-KM6'
      DEVICE_NAME:
        description: 'PRODUCT_DEVICE in BoardConfig.mk → dipakai untuk path out/target/product/'
        required: true
        default: 'TECNO-KM6'
      LUNCH_NAME:
        description: 'PRODUCT_NAME suffix di ofox_*.mk (isi KM6, prefix ofox_ otomatis ditambah)'
        required: true
        default: 'KM6'
      BUILD_TARGET:
        description: 'Specify your Build Target'
        required: true
        default: 'vendorboot'
        type: choice
        options:
        - boot
        - recovery
        - vendorboot
      LDCHECK:
        description: 'Path of blobs to check'
        required: true
        default: 'system/bin/qseecomd'
      RECOVERY_TAR:
        description: 'Release recovery.tar For Samsung devices'
        required: false
        default: false
        type: boolean
      RECOVERY_INSTALLER:
        description: 'Include recovery installer zip'
        type: boolean
        required: true
        default: true

jobs:
  build:
    name: Build OFRP by ${{ github.actor }}
    runs-on: ubuntu-latest
    if: github.event.repository.owner.id == github.event.sender.id
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    permissions:
      contents: write
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Display Inputs
      run: |
        echo "::group::User Environment Variables"
        echo "Manifest Branch   : ${{ github.event.inputs.MANIFEST_BRANCH }}"
        echo "Device Tree       : ${{ github.event.inputs.DEVICE_TREE }}"
        echo "Device Tree Branch: ${{ github.event.inputs.DEVICE_TREE_BRANCH }}"
        echo "Device Path       : ${{ github.event.inputs.DEVICE_PATH }}"
        echo "DEVICE_NAME       : ${{ github.event.inputs.DEVICE_NAME }}"
        echo "LUNCH_NAME        : ${{ github.event.inputs.LUNCH_NAME }}"
        echo "Build Target      : ${{ github.event.inputs.BUILD_TARGET }}"
        echo "Recovery Installer: ${{ github.event.inputs.RECOVERY_INSTALLER }}"
        echo "Recovery TAR      : ${{ github.event.inputs.RECOVERY_TAR }}"
        echo "::endgroup::"

    - name: Clean-up
      uses: rokibhasansagar/slimhub_actions@main

    - name: Swap Space
      uses: pierotofy/set-swap-space@master
      with:
        swap-size-gb: 24

    - name: Build Environment
      run: |
        sudo apt update
        sudo apt -y upgrade
        rm -rf scripts
        git clone https://gitlab.com/OrangeFox/misc/scripts
        cd scripts
        sudo bash setup/android_build_env.sh

    - name: Set-up Manifest
      if: github.event.inputs.MANIFEST_BRANCH == '12.1' || github.event.inputs.MANIFEST_BRANCH == '14.1'
      run: |
        mkdir -p ${GITHUB_WORKSPACE}/OrangeFox
        cd ${GITHUB_WORKSPACE}/OrangeFox
        git config --global user.name "${{ github.actor }}"
        git config --global user.email "${{ github.actor_id }}+${{ github.actor }}@users.noreply.github.com"
        git clone https://gitlab.com/OrangeFox/sync.git
        cd sync
        ./orangefox_sync.sh --branch ${{ github.event.inputs.MANIFEST_BRANCH }} --path ${GITHUB_WORKSPACE}/OrangeFox/fox_${{ github.event.inputs.MANIFEST_BRANCH }}

    - name: Clone Device Tree
      run: |
        cd ${GITHUB_WORKSPACE}/OrangeFox/fox_${{ github.event.inputs.MANIFEST_BRANCH }}
        git clone ${{ github.event.inputs.DEVICE_TREE }} -b ${{ github.event.inputs.DEVICE_TREE_BRANCH }} ./${{ github.event.inputs.DEVICE_PATH }}
        cd ${{ github.event.inputs.DEVICE_PATH }}
        echo "COMMIT_ID=$(git rev-parse HEAD)" >> $GITHUB_ENV

    - name: Check Manifest Branch
      uses: haya14busa/action-cond@v1
      id: fox_branch
      with:
        # KM6 mendaftarkan lunch combo "ofox_KM6-eng" di AndroidProducts.mk
        # (bukan twrp_ prefix seperti di wiki umum, karena PRODUCT_NAME=ofox_KM6)
        # VAB + GKI2.0 (BOOT_HEADER_VERSION=4) → target: vendorbootimage
        cond: ${{ github.event.inputs.MANIFEST_BRANCH == '12.1' }}
        if_true: lunch ofox_${{ github.event.inputs.LUNCH_NAME }}-eng && make clean && mka adbd ${{ github.event.inputs.BUILD_TARGET == 'vendorboot' && 'vendorbootimage' || github.event.inputs.BUILD_TARGET == 'recovery' && 'recoveryimage' || 'bootimage' }}
        if_false: lunch omni_${{ github.event.inputs.LUNCH_NAME }}-eng && make clean && mka ${{ github.event.inputs.BUILD_TARGET }}image

    - name: Debug - Check vendor folder
      run: |
        echo "=== Listing vendor/ folder ==="
        ls ${GITHUB_WORKSPACE}/OrangeFox/fox_${{ github.event.inputs.MANIFEST_BRANCH }}/vendor/ || echo "vendor/ not found"
        echo "=== Listing vendor/recovery (if exists) ==="
        ls ${GITHUB_WORKSPACE}/OrangeFox/fox_${{ github.event.inputs.MANIFEST_BRANCH }}/vendor/recovery/ 2>/dev/null || echo "vendor/recovery not found"

    - name: Building OrangeFox
      run: |
        cd ${GITHUB_WORKSPACE}/OrangeFox/fox_${{ github.event.inputs.MANIFEST_BRANCH }}
        set +e
        source build/envsetup.sh

        # === Export wajib sesuai wiki resmi OrangeFox ===
        export ALLOW_MISSING_DEPENDENCIES=true
        export LC_ALL="C"

        # FOX_BUILD_DEVICE wajib di-export sebelum lunch
        # agar OrangeFox build vars (FOX_*) diproses dengan benar (wiki tip I)
        export FOX_BUILD_DEVICE=${{ github.event.inputs.LUNCH_NAME }}

        # KM6 = Virtual A/B device
        # BOARD_INCLUDE_RECOVERY_RAMDISK_IN_VENDOR_BOOT = true
        export FOX_VIRTUAL_AB_DEVICE=1
        export FOX_AB_DEVICE=1

        # KM6 pakai prebuilt kernel (TARGET_NO_KERNEL=true di BoardConfig.mk)
        # Wajib set ini agar tidak error "NO KERNEL CONFIG" (wiki tip H)
        export OF_FORCE_PREBUILT_KERNEL=1

        # Keymaster version KM6 = 4 (sesuai OF_DEFAULT_KEYMASTER_VERSION di BoardConfig.mk)
        # Wajib untuk cegah build stuck di logo / masalah decryption (wiki tip J)
        export OF_DEFAULT_KEYMASTER_VERSION=4

        set -e
        ${{ steps.fox_branch.outputs.value }}

        # === Debug output setelah build ===
        echo "::group::Build Output Debug"
        OUT_DIR="out/target/product/${{ github.event.inputs.DEVICE_NAME }}"
        echo "--- .img files in ${OUT_DIR} ---"
        ls ${OUT_DIR}/*.img 2>/dev/null || echo "No .img found!"
        echo "--- OrangeFox* files ---"
        find ${OUT_DIR} -maxdepth 2 -name "OrangeFox*" 2>/dev/null || echo "No OrangeFox* found"
        echo "--- vendor_boot* files ---"
        find ${OUT_DIR} -maxdepth 2 -name "vendor_boot*" 2>/dev/null || echo "No vendor_boot* found"
        echo "::endgroup::"

    - name: Set Build Date
      run: |
        echo "BUILD_DATE=$(date +%Y%m%d)" >> $GITHUB_ENV
        DEVICE_TREE_URL="${{ github.event.inputs.DEVICE_TREE }}"
        if [[ "${DEVICE_TREE_URL}" == *.git ]]; then
          DEVICE_TREE_URL="${DEVICE_TREE_URL%.git}"
        fi
        echo "DEVICE_TREE_URL=${DEVICE_TREE_URL}" >> $GITHUB_ENV

    - name: Check if Recovery Exists
      run: |
        cd ${GITHUB_WORKSPACE}/OrangeFox/fox_${{ github.event.inputs.MANIFEST_BRANCH }}
        # DEVICE_NAME = PRODUCT_DEVICE (TECNO-KM6)
        # karena out/target/product/ menggunakan PRODUCT_DEVICE, bukan PRODUCT_NAME
        OUT_DIR="out/target/product/${{ github.event.inputs.DEVICE_NAME }}"

        echo "=== Isi out directory ==="
        ls ${OUT_DIR}/ 2>/dev/null || echo "Out dir tidak ditemukan!"

        # Cek OrangeFox*.img (output resmi OrangeFox setelah rename otomatis)
        # Fallback: vendor_boot.img (raw output dari mka vendorbootimage)
        if ls ${OUT_DIR}/OrangeFox*.img 1>/dev/null 2>&1; then
            echo "CHECK_IMG_IS_OK=true" >> $GITHUB_ENV
            echo "FILE_PATH=${GITHUB_WORKSPACE}/OrangeFox/fox_${{ github.event.inputs.MANIFEST_BRANCH }}/${OUT_DIR}" >> $GITHUB_ENV
            echo "MD5_IMG=$(md5sum ${OUT_DIR}/OrangeFox*.img | cut -d ' ' -f 1)" >> $GITHUB_ENV
            echo "Found: OrangeFox*.img"
        elif [ -f ${OUT_DIR}/vendor_boot.img ]; then
            echo "CHECK_IMG_IS_OK=true" >> $GITHUB_ENV
            echo "FILE_PATH=${GITHUB_WORKSPACE}/OrangeFox/fox_${{ github.event.inputs.MANIFEST_BRANCH }}/${OUT_DIR}" >> $GITHUB_ENV
            echo "MD5_IMG=$(md5sum ${OUT_DIR}/vendor_boot.img | cut -d ' ' -f 1)" >> $GITHUB_ENV
            echo "Found: vendor_boot.img (VAB fallback)"
        else
            echo "Recovery out directory is empty."
            echo "=== Full file listing ==="
            find ${OUT_DIR} -maxdepth 1 -type f 2>/dev/null || echo "Out dir empty/not found"
            exit 1
        fi

    - name: Rename the Recovery
      run: |
        cd ${{ env.FILE_PATH }}/
        if [ "${{ github.event.inputs.BUILD_TARGET }}" = "boot" ]; then
          if ls OrangeFox*.img 1>/dev/null 2>&1; then mv OrangeFox*.img boot.img; fi
          echo "RECOVERY_TYPE=boot" >> $GITHUB_ENV
          echo "boot.img found!"
        elif [ "${{ github.event.inputs.BUILD_TARGET }}" = "recovery" ]; then
          if ls OrangeFox*.img 1>/dev/null 2>&1; then mv OrangeFox*.img recovery.img; fi
          echo "RECOVERY_TYPE=recovery" >> $GITHUB_ENV
          echo "recovery.img found!"
        elif [ "${{ github.event.inputs.BUILD_TARGET }}" = "vendorboot" ]; then
          if ls OrangeFox*.img 1>/dev/null 2>&1; then mv OrangeFox*.img vendor_boot.img; fi
          echo "RECOVERY_TYPE=vendor_boot" >> $GITHUB_ENV
          echo "vendor_boot.img found!"
        else
          echo "No Recovery file found!"
        fi
      continue-on-error: true

    - name: Include Recovery Installer
      run: |
        if [ "${{ github.event.inputs.RECOVERY_INSTALLER }}" = "true" ]; then
          cd ${{ env.FILE_PATH }}/
          wget https://github.com/kinguser981/recovery-installer/releases/download/11256427880/recovery-installer.zip
          zip -ur recovery-installer.zip ${{ env.RECOVERY_TYPE }}.img
        fi
      continue-on-error: true

    - name: Upload to Release
      if: env.CHECK_IMG_IS_OK == 'true'
      uses: softprops/action-gh-release@v2
      with:
        files: |
          ${{ env.FILE_PATH }}/${{ env.RECOVERY_TYPE }}.img
          ${{ env.FILE_PATH }}/${{ env.RECOVERY_TYPE }}.tar
          ${{ env.FILE_PATH }}/recovery-installer.zip
          ${{ env.FILE_PATH }}/OrangeFox*.zip
        name: Unofficial OrangeFox R12 for ${{ github.event.inputs.DEVICE_NAME }} // ${{ env.BUILD_DATE }}
        tag_name: ${{ github.run_id }}
        body: |
          **OrangeFox R12 — fox_${{ github.event.inputs.MANIFEST_BRANCH }}**
          Build Date: ${{ env.BUILD_DATE }}
          Device: [Device Tree/Branch](${{ env.DEVICE_TREE_URL }}/tree/${{ github.event.inputs.DEVICE_TREE_BRANCH }})
          Commit: Most recent [commit](${{ env.DEVICE_TREE_URL }}/commit/${{ env.COMMIT_ID }}) during building.

    - name: Release ramdisk-recovery
      if: env.CHECK_IMG_IS_OK == 'true'
      uses: softprops/action-gh-release@v2
      with:
        files: |
          ${{ env.FILE_PATH }}/obj/PACKAGING/vendor_ramdisk_fragments_intermediates/recovery.*
          ${{ env.FILE_PATH }}/ramdisk-recovery.*
        name: Unofficial OrangeFox R12 for ${{ github.event.inputs.DEVICE_NAME }} // ${{ env.BUILD_DATE }}
        tag_name: ${{ github.run_id }}
        body: |
          **OrangeFox R12 — fox_${{ github.event.inputs.MANIFEST_BRANCH }}**
          Target: ${{ env.RECOVERY_TYPE }}.img
          Build Date: ${{ env.BUILD_DATE }}
          Device: [Device Tree/Branch](${{ env.DEVICE_TREE_URL }}/tree/${{ github.event.inputs.DEVICE_TREE_BRANCH }})
          Commit: Most recent [commit](${{ env.DEVICE_TREE_URL }}/commit/${{ env.COMMIT_ID }}) during building.
          MD5 (img): ${{ env.MD5_IMG }}

    - name: Run LDCheck
      run: |
        cd tools
        mv -n libneeds ${{ env.FILE_PATH }}/recovery/root/
        mv -n ldcheck ${{ env.FILE_PATH }}/recovery/root/
        cd ${{ env.FILE_PATH }}/recovery/root/
        python3 ldcheck -p system/lib64:vendor/lib64:system/lib:vendor/lib -d ${{ github.event.inputs.LDCHECK }}
        echo "Done checking missing dependencies. Review, and reconfigure your tree."
      continue-on-error: true
